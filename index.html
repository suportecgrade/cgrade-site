body {
  margin: 0;
  font-family: Arial, Helvetica, sans-serif;
  background:
    linear-gradient(rgba(10, 20, 14, 0.72), rgba(10, 20, 14, 0.78)),
    linear-gradient(135deg, #1b2f24, #2f5d3c);
  color: #ffffff;
  min-height: 100vh;
}

.page {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 32px 18px;
}

.card {
  width: 100%;
  max-width: 520px;
  background: rgba(255, 255, 255, 0.12);
  border: 1px solid rgba(255, 255, 255, 0.18);
  border-radius: 24px;
  padding: 22px;
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  box-shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
  text-align: center;
}

.hero-image {
  width: 100%;
  max-width: 320px;
  display: block;
  margin: 0 auto 22px;
  border-radius: 20px;
  box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
}

.logo-title {
  font-size: 2rem;
  margin: 0 0 8px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

.subtitle {
  margin: 0 0 28px;
  font-size: 1rem;
  color: rgba(255, 255, 255, 0.88);
  line-height: 1.5;
}

.buttons {
  display: grid;
  gap: 14px;
}

.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-decoration: none;
  padding: 16px 18px;
  border-radius: 16px;
  font-size: 1rem;
  font-weight: 700;
  transition: transform 0.2s ease, box-shadow 0.2s ease, opacity 0.2s ease;
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
}

.btn:hover {
  transform: translateY(-2px);
  opacity: 0.96;
}

.btn-whatsapp {
  background: #25d366;
  color: #ffffff;
}

.btn-email {
  background: #ffffff;
  color: #1f2a22;
}

.btn-linkedin {
  background: #0a66c2;
  color: #ffffff;
}

.footer-text {
  margin-top: 20px;
  font-size: 0.92rem;
  color: rgba(255, 255, 255, 0.78);
}

.floating-whatsapp {
  position: fixed;
  right: 18px;
  bottom: 18px;
  width: 58px;
  height: 58px;
  border-radius: 50%;
  background: #25d366;
  color: #ffffff;
  text-decoration: none;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  box-shadow: 0 12px 28px rgba(0, 0, 0, 0.28);
  transition: transform 0.2s ease;
}

.floating-whatsapp:hover {
  transform: scale(1.06);
}

@media (max-width: 480px) {
  .card {
    padding: 18px;
    border-radius: 20px;
  }

  .hero-image {
    max-width: 260px;
  }

  .logo-title {
    font-size: 1.7rem;
  }

  .btn {
    font-size: 0.96rem;
    padding: 15px 16px;
  }
}
