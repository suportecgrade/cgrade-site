<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>C.Grade — Agronegócio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#1a2a1a;color:#fff;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
a{text-decoration:none;color:inherit}
header{position:fixed;top:0;left:0;width:100%;z-index:100;padding:14px 24px;background:rgba(26,42,26,.92);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.06)}
.logo{display:flex;align-items:center}
.logo img{height:36px;width:auto;display:block;filter:drop-shadow(0 2px 8px rgba(0,0,0,.3))}
.btn-origem{display:inline-flex;align-items:center;gap:10px;padding:14px 30px;background:linear-gradient(135deg,#8ab85a,#5a8a3a);color:#fff;border-radius:50px;font-weight:700;font-size:1rem;transition:all .3s;border:none;cursor:pointer;animation:pulse-btn 2s ease-in-out infinite;box-shadow:0 6px 24px rgba(125,170,90,.3);position:relative;overflow:hidden}
.btn-origem::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:linear-gradient(45deg,transparent 30%,rgba(255,255,255,.12) 50%,transparent 70%);animation:shine-btn 3s ease-in-out infinite}
.btn-origem:hover{transform:translateY(-3px) scale(1.04);box-shadow:0 14px 36px rgba(125,170,90,.5)}
.btn-origem svg{width:18px;height:18px;fill:currentColor;animation:rotate-icon 3s ease-in-out infinite}
@keyframes pulse-btn{0%,100%{box-shadow:0 6px 24px rgba(125,170,90,.3)}50%{box-shadow:0 6px 40px rgba(125,170,90,.6)}}
@keyframes shine-btn{0%{transform:translateX(-100%) rotate(45deg)}100%{transform:translateX(100%) rotate(45deg)}}
@keyframes rotate-icon{0%,100%{transform:rotate(0)}50%{transform:rotate(15deg)}}

.hero{flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;margin-top:70px;padding:40px 24px;position:relative;overflow:hidden}

.crop-scene{width:100%;max-width:1100px;margin:0 auto 40px;position:relative;border-radius:20px;overflow:hidden;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.crop-bg{position:relative;width:100%;height:300px;background:repeating-linear-gradient(
  92deg,
  #4a7a2a 0px,#5a8a3a 6px,#6a9a4a 10px,#5a8a3a 14px,#4a7a2a 18px,#3a6a1a 24px
);background-size:240px 100%;animation:scroll-field 12s linear infinite}
.crop-bg::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(
  0deg,transparent,transparent 18px,rgba(0,0,0,.07) 18px,rgba(0,0,0,.07) 19px
);pointer-events:none}
.crop-bg::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(
  90deg,
  rgba(26,42,26,1) 0%,
  rgba(26,42,26,0) 10%,
  rgba(26,42,26,0) 90%,
  rgba(26,42,26,1) 100%
);pointer-events:none}

@keyframes scroll-field{0%{background-position:0 0}100%{background-position:-240px 0}}

.combine-drive{position:absolute;bottom:30px;z-index:2;font-size:clamp(2rem,4vw,3.2rem);filter:drop-shadow(0 6px 20px rgba(0,0,0,.5));animation:combine-cross 7s ease-in-out infinite;pointer-events:none}
@keyframes combine-cross{0%{left:calc(100% + 70px);opacity:0}8%{opacity:1}38%{left:-70px;opacity:1}46%{left:-70px;opacity:0}100%{left:calc(100% + 70px);opacity:0}}

.crop-overlay{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;z-index:3}
.crop-fade{position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(
  ellipse 400px 200px at 50% 50%,
  rgba(26,42,26,0) 0%,
  rgba(26,42,26,.3) 40%,
  rgba(26,42,26,.7) 65%,
  rgba(26,42,26,1) 100%
);z-index:2;pointer-events:none}

.construction-sign{position:relative;z-index:3;text-align:center;animation:fade-glow 3s ease-in-out infinite}
.construction-sign h2{font-family:'Georgia',serif;font-size:clamp(1.8rem,5vw,3.6rem);font-weight:700;color:#d4c4a0;letter-spacing:8px;text-shadow:0 4px 30px rgba(0,0,0,.6),0 0 60px rgba(212,196,160,.1)}
.construction-sign h2 span{color:#7daa5a}
.construction-sign p{font-size:clamp(.7rem,1.2vw,.9rem);color:rgba(212,196,160,.4);letter-spacing:4px;text-transform:uppercase;margin-top:8px;text-shadow:0 2px 20px rgba(0,0,0,.5)}

@keyframes fade-glow{0%,100%{opacity:.85;filter:brightness(1)}50%{opacity:1;filter:brightness(1.15)}}

.crop-line{position:absolute;bottom:0;left:0;width:100%;height:6px;z-index:4;background:linear-gradient(90deg,transparent 0%,#7daa5a 20%,#d4c4a0 50%,#7daa5a 80%,transparent 100%);animation:line-pulse 3s ease-in-out infinite;border-radius:2px;filter:blur(2px)}
@keyframes line-pulse{0%,100%{opacity:.3;transform:scaleX(.8)}50%{opacity:.8;transform:scaleX(1)}}

.tagline{text-align:center;margin-top:10px}
.tagline-logo{display:flex;align-items:center;justify-content:center;gap:12px;margin-bottom:10px}
.tagline-logo img{height:clamp(40px,6vw,70px);width:auto;display:block;filter:drop-shadow(0 4px 16px rgba(0,0,0,.3))}
.tagline-logo .logo-divider{width:2px;height:clamp(28px,4vw,44px);background:linear-gradient(180deg,transparent,#d4c4a0,transparent)}
.tagline-logo .brand-text{font-family:'Georgia',serif;font-size:clamp(1.4rem,4vw,2.8rem);color:#d4c4a0;font-weight:400;letter-spacing:2px}
.tagline-logo .brand-text span{color:#7daa5a;font-weight:700}
.tagline p{color:rgba(212,196,160,.5);font-size:clamp(.8rem,1.2vw,1rem);margin-top:8px;letter-spacing:1px}

.contact-section{padding:40px 24px 60px;text-align:center;border-top:1px solid rgba(255,255,255,.05)}
.contact-section h3{font-size:.7rem;text-transform:uppercase;letter-spacing:4px;color:rgba(212,196,160,.4);margin-bottom:24px}
.links{display:flex;justify-content:center;gap:24px;flex-wrap:wrap}
.icon{width:64px;height:64px;border-radius:50%;background:rgba(255,255,255,.1);display:flex;align-items:center;justify-content:center;transition:all .3s;border:1px solid rgba(255,255,255,.15)}
.icon:hover{transform:translateY(-4px);background:rgba(125,170,90,.2);border-color:#7daa5a}
.icon img{width:28px;height:28px;object-fit:contain;transition:filter .3s}
.contact-note{color:rgba(255,255,255,.25);font-size:.75rem;margin-top:30px;letter-spacing:1px}

@media(max-width:900px){
.btn-origem svg{display:none}
}
@media(max-width:600px){
header{padding:10px 12px}
.logo{font-size:1rem}
.btn-origem{padding:10px 18px;font-size:.82rem;white-space:nowrap}
.hero{padding:14px 10px;margin-top:54px}
.crop-scene{margin-bottom:20px;border-radius:12px}
.crop-bg{height:180px;border-radius:12px}
.crop-fade{background:radial-gradient(ellipse 220px 120px at 50% 50%,rgba(26,42,26,0) 0%,rgba(26,42,26,.3) 40%,rgba(26,42,26,.7) 65%,rgba(26,42,26,1) 100%)}
.combine-drive{font-size:clamp(1.6rem,7vw,2.2rem);bottom:14px}
@keyframes combine-cross{0%{left:calc(100% + 50px);opacity:0}8%{opacity:1}38%{left:-50px;opacity:1}46%{left:-50px;opacity:0}100%{left:calc(100% + 50px);opacity:0}}
.construction-sign h2{font-size:clamp(1.3rem,7vw,2rem);letter-spacing:3px}
.construction-sign p{font-size:.65rem;letter-spacing:2px}
.tagline h1{font-size:clamp(1.3rem,6vw,1.8rem)}
.tagline p{font-size:.75rem}
.crop-line{height:4px}
.contact-section{padding:24px 14px 40px}
.contact-section h3{font-size:.6rem;margin-bottom:16px}
.links{gap:16px}
.icon{width:50px;height:50px}
.icon img{width:22px;height:22px}
}
@media(max-width:380px){
header{padding:8px 10px}
.logo img{height:24px}
.btn-origem{padding:6px 10px;font-size:.65rem}
.crop-bg{height:150px}
.crop-fade{background:radial-gradient(ellipse 170px 90px at 50% 50%,rgba(26,42,26,0) 0%,rgba(26,42,26,.3) 40%,rgba(26,42,26,.7) 65%,rgba(26,42,26,1) 100%)}
.combine-drive{font-size:1.4rem;bottom:10px}
.construction-sign h2{font-size:1.1rem;letter-spacing:2px}
}
</style>
</head>
