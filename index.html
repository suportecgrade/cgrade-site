<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>C.Grade</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #ffffff;
      color: #333;
      text-align: center;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 50px 20px;
    }

    .hero {
      width: 100%;
      max-width: 420px;
      border-radius: 12px;
      margin-bottom: 30px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.10);
    }

    h1 {
      margin: 0 0 12px;
      font-size: 30px;
      color: #2f3a2f;
    }

    p {
      margin: 0 0 32px;
      font-size: 16px;
      color: #666;
    }

    .links {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
    }

    .icon {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.10);
      transition: transform 0.2s ease, background 0.2s ease;
      text-decoration: none;
    }

    .icon:hover {
      transform: translateY(-4px);
      background: #ececec;
    }

    .icon img {
      width: 34px;
      height: 34px;
      object-fit: contain;
    }

    @media (max-width: 480px) {
      .container {
        padding: 40px 16px;
      }

      .hero {
        max-width: 100%;
      }

      h1 {
        font-size: 26px;
      }

      .links {
        gap: 20px;
      }

      .icon {
        width: 68px;
        height: 68px;
      }

      .icon img {
        width: 30px;
        height: 30px;
      }
    }
  </style>

</head>
<body>
  <div class="container">
    <img src="hero.png" alt="C.Grade" class="hero">


<p>Em breve novidades no agronegócio 🚜</p>

<div class="links">
  <a href="https://wa.me/5542988471259" target="_blank" class="icon" aria-label="WhatsApp">
    <img src="telefone.png" alt="WhatsApp">
  </a>

  <a href="mailto:contato@cgrade.com.br" class="icon" aria-label="Email">
    <img src="email.png" alt="Email">
  </a>

  <a href="https://www.linkedin.com/in/cristianograde/" target="_blank" class="icon" aria-label="LinkedIn">
    <img src="linkedin.png" alt="LinkedIn">
  </a>
</div>


  </div>
</body>
</html>
